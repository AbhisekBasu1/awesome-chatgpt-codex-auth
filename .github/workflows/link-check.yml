name: Link check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check project and evidence links
        run: python3 scripts/check_links.py --verify-evidence
